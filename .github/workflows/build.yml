name: Build Flet APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Flet and Setup Android SDK
        run: |
          pip install flet
          # Автоматически принимаем все лицензии Android SDK
          yes | sdkmanager --licenses || true

      - name: Pre-initialize Flet Build
        run: |
          # Принудительно заставляем flet увидеть установленный Flutter
          flet build apk --no-config || true

      - name: Build APK
        run: |
          flet build apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: risk-calculator-apk
          path: build/apk/*.apk

name: Build Flet APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: |
          pip install flet

      - name: Build APK with Icon
        run: |
          # В новых версиях Flet обходим интерактивный запрос через конвейер yes
          # И передаем параметры сборки корректно
          yes | flet build apk --icon ./icon.png
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: risk-calculator-apk
          path: build/apk/*.apk

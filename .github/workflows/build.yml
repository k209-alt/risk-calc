name: Build Flet APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: |
          pip install flet

      - name: Build APK
        run: |
          # Создаем файл конфигурации flet.toml, где жестко прописываем путь к иконке
          echo '[main]' > flet.toml
          echo 'assets_dir = "assets"' >> flet.toml
          
          # Flet ищет иконку в папке assets, создаем её и копируем туда наш icon.png
          mkdir -p assets
          cp icon.png assets/icon.png
          
          # Запускаем сборку без ломающих CLI флагов. 
          # Конвейер yes автоматически прожмет "y" на соглашении об установке Flutter SDK
          yes | flet build apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: risk-calculator-apk
          path: build/apk/*.apk

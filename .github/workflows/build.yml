name: Build Flet APK
on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Flet
        run: |
          pip install flet

      - name: Build APK
        run: |
          mkdir -p assets
          
          if [ -f "icon.png" ]; then
            cp icon.png assets/icon.png
          fi
          
          # Задаем официальное название приложения в конфигурации flet.toml
          echo '[main]' > flet.toml
          echo 'name = "Calculator of Risk"' >> flet.toml
          echo 'assets_dir = "assets"' >> flet.toml
          
          # Собираем чистый APK. Проблема с черным экраном решена за счет исправленного main.py
          yes | flet build apk
          
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: risk-calculator-apk
          path: build/apk/*.apk
